name: Daily stage scrape

on:
  schedule:
    # 16:30 UTC = 11:30 AM US Central (CDT, July) every day of the Tour window,
    # July 4-26 2026. Stages finish ~17:15 CEST (15:15 UTC / 10:15 CT), so
    # results and official fantasy scoring are posted by 11:30 AM Central. Matt
    # refreshes the Tissot session around this time. Rest days (Jul 13, 20)
    # find no new stage and no-op.
    - cron: "30 16 4-26 7 *"
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage number to scrape (blank = auto from calendar)"
        required: false

permissions:
  contents: write # auto-commit of scraped data
  actions: write # trigger the Deploy workflow after the data commit

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine stage number
        id: stage
        run: |
          if [ -n "${{ github.event.inputs.stage }}" ]; then
            echo "n=${{ github.event.inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            # Map today's date to a stage number: Jul 4 = stage 1, with rest
            # days on Jul 13 and Jul 20 (day maps must match src/tokens.js).
            python - <<'EOF' >> "$GITHUB_OUTPUT"
          import datetime
          today = datetime.datetime.now(datetime.UTC).date()
          start = datetime.date(2026, 7, 4)
          rest_days = {datetime.date(2026, 7, 13), datetime.date(2026, 7, 20)}
          if today < start or today in rest_days:
              print("n=")
          else:
              n = (today - start).days + 1 - sum(1 for r in rest_days if r < today)
              print(f"n={n if 1 <= n <= 21 else ''}")
          EOF
          fi

      # Official fantasy data (the source of truth for points/rank). Runs every
      # day of the window — on rest days it just re-snapshots the same
      # cumulative totals. Fails loudly if the token has expired.
      - name: Scrape official Tissot data
        env:
          TISSOT_TOKEN: ${{ secrets.TISSOT_TOKEN }}
        run: python scripts/scrape_official.py

      # Real-race layer (stage results, GC, jerseys) — only on stage days.
      - name: Scrape race results (letour.fr)
        if: steps.stage.outputs.n != ''
        run: python scripts/scrape_letour.py --stage "${{ steps.stage.outputs.n }}"

      - name: Build dataset
        run: python scripts/build_data.py

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "pushed=false" >> "$GITHUB_ENV"
          else
            git commit -m "Data update $(date -u +%F)${{ steps.stage.outputs.n && format(' (stage {0})', steps.stage.outputs.n) || '' }}"
            git pull --rebase origin main
            git push
            echo "pushed=true" >> "$GITHUB_ENV"
          fi

      # Commits made with GITHUB_TOKEN don't trigger other workflows (a
      # security default), so fire the Pages deploy explicitly.
      - name: Trigger Deploy workflow
        if: env.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy to GitHub Pages" --ref main --repo "$GITHUB_REPOSITORY"
